name: Update Hotel/OTA Radar

on:
  workflow_dispatch:
  schedule:
    # 每 3 小时跑一次(行业动态更新慢,无需高频);分钟错开整点
    - cron: "17 */3 * * *"
  push:
    branches: [main]
    # 只在抓取相关文件变化时触发,改前端文案不会跑抓取
    paths:
      - "scripts/update_hotel.py"
      - "config/hotel_sources.yaml"
      - ".github/workflows/update-news.yml"

concurrency:
  group: update-hotel-radar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser python-dateutil pyyaml

      - name: Fetch hotel/OTA sources
        run: python scripts/update_hotel.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update hotel/ota radar snapshot"
          git push
